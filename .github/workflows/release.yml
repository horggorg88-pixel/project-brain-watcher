name: Release Watcher

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install desktop dependencies
        run: npm --prefix apps/watcher-desktop ci

      - name: Verify release contract
        run: npm run verify-release

      - name: Desktop E2E
        shell: pwsh
        env:
          PB_E2E_EMAIL: ${{ secrets.PB_E2E_EMAIL }}
          PB_E2E_PASSWORD: ${{ secrets.PB_E2E_PASSWORD }}
          PB_E2E_PROJECT_ROOT: ${{ vars.PB_E2E_PROJECT_ROOT }}
          PB_E2E_PROJECT_ID: ${{ vars.PB_E2E_PROJECT_ID }}
          PB_E2E_SERVER_URL: ${{ vars.PB_E2E_SERVER_URL }}
          PB_E2E_CONSOLE_URL: ${{ vars.PB_E2E_CONSOLE_URL }}
        run: |
          if (-not $env:PB_E2E_PROJECT_ROOT -or -not (Test-Path -LiteralPath $env:PB_E2E_PROJECT_ROOT)) {
            Write-Host "Skipping live desktop E2E: PB_E2E_PROJECT_ROOT is not configured on this runner."
            exit 0
          }
          if (-not $env:PB_E2E_EMAIL -or -not $env:PB_E2E_PASSWORD) {
            Write-Host "Skipping live desktop E2E: PB_E2E_EMAIL/PB_E2E_PASSWORD secrets are not configured."
            exit 0
          }
          npm --prefix apps/watcher-desktop run test:e2e

      - name: Build desktop installer
        run: npm run desktop:dist

      - name: Pack watcher npm package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          npm pack . --pack-destination release

      - name: Generate checksums
        shell: pwsh
        run: |
          $files = @()
          $files += Get-ChildItem -LiteralPath release -File
          $desktopVersion = (Get-Content -LiteralPath apps/watcher-desktop/package.json | ConvertFrom-Json).version
          $desktopAssetPattern = "^ProjectBrainWatcher-$([regex]::Escape($desktopVersion))-x64\.exe(\.blockmap)?$"
          $files += Get-ChildItem -LiteralPath apps/watcher-desktop/release -File | Where-Object { $_.Name -match $desktopAssetPattern }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content -LiteralPath release/SHA256SUMS.txt -Encoding utf8

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view $env:TAG_NAME *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:TAG_NAME --title $env:TAG_NAME --notes "Project Brain watcher release $env:TAG_NAME"
          }
          $watcherVersion = (Get-Content -LiteralPath package.json | ConvertFrom-Json).version
          $desktopVersion = (Get-Content -LiteralPath apps/watcher-desktop/package.json | ConvertFrom-Json).version
          $desktopAssetPattern = "^ProjectBrainWatcher-$([regex]::Escape($desktopVersion))-x64\.exe(\.blockmap)?$"
          $assets = @()
          $assets += Get-ChildItem -LiteralPath release -File | Where-Object { $_.Name -eq "project-brain-watcher-$watcherVersion.tgz" }
          $assets += Get-ChildItem -LiteralPath apps/watcher-desktop/release -File | Where-Object { $_.Name -match $desktopAssetPattern }
          $assets += Get-Item -LiteralPath release/SHA256SUMS.txt
          $assetPaths = @($assets | Sort-Object -Property Name -Unique | ForEach-Object { $_.FullName })
          $expectedRequiredAssetNames = @(
            "project-brain-watcher-$watcherVersion.tgz",
            "ProjectBrainWatcher-$desktopVersion-x64.exe",
            "ProjectBrainWatcher-$desktopVersion-x64.exe.blockmap",
            "SHA256SUMS.txt"
          )
          $actualAssetNames = @($assetPaths | ForEach-Object { Split-Path -Leaf $_ })
          $missingRequiredAssets = @($expectedRequiredAssetNames | Where-Object { $actualAssetNames -notcontains $_ })
          if ($missingRequiredAssets.Count -gt 0) {
            throw "Missing watcher release assets: $($missingRequiredAssets -join ', ')"
          }
          if ($assetPaths.Count -eq 0) {
            throw "No watcher release assets were found"
          }
          Write-Host "Uploading release assets:"
          $assetPaths | ForEach-Object { Write-Host " - $_" }
          $expectedAssetNames = @($assetPaths | ForEach-Object { Split-Path -Leaf $_ })
          $releaseInfo = gh release view $env:TAG_NAME --json assets | ConvertFrom-Json
          foreach ($asset in $releaseInfo.assets) {
            if ($expectedAssetNames -notcontains $asset.name) {
              Write-Host "Deleting stale release asset: $($asset.name)"
              gh release delete-asset $env:TAG_NAME $asset.name -y
            }
          }
          gh release upload $env:TAG_NAME @assetPaths --clobber
